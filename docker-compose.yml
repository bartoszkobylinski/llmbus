# LOCAL DEV ONLY. Spins up an Apache Iggy broker for development and
# integration tests on this laptop.
#
# PROD (VPS) does NOT use Docker: the Iggy server runs as a systemd unit from a
# GitHub-release binary, bound to 127.0.0.1:8090 (see ARCHITECTURE.md §9b).
# Never point dev code at the prod broker — dev gets its own throwaway log.
#
# NOTE: the credential/flag handling of the apache/iggy image is verified at the
# first live connect (the client PR), not here.
services:
  iggy:
    image: apache/iggy:latest
    container_name: llmbus-iggy
    ports:
      - "8090:8090"   # TCP  — the SDK talks this
      - "3000:3000"   # HTTP — health/stats
      - "8080:8080"   # QUIC
    # Bind TCP to all interfaces, not Iggy's default 127.0.0.1 (container loopback),
    # so the SDK on the host reaches it through the port mapping. Prod (systemd on
    # the VPS, §9b) keeps 127.0.0.1 — localhost-only, no port-forward in the path.
    # NOTE: apache/iggy 0.7.0+ is an io_uring server that does NOT start under Docker
    # Desktop on macOS (VM kernel lacks io_uring). Dev on macOS: run the SDK against
    # the CI Iggy or a Linux box; this compose is for Linux dev hosts.
    environment:
      IGGY_TCP_ADDRESS: 0.0.0.0:8090
      # 0.8.0 generates a random root password on first start unless these are set
      # (only applied when the data volume is empty; delete it to reset creds).
      IGGY_ROOT_USERNAME: iggy
      IGGY_ROOT_PASSWORD: iggy
    volumes:
      - iggy-data:/local_data
    restart: unless-stopped

volumes:
  iggy-data:
